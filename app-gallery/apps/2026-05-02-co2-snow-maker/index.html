<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CO₂ Snow Maker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px}
#warn{background:#2d1f1f;border-bottom:1px solid #5a3a3a;padding:3px 8px;font-size:10px;color:#f0883e;text-align:center;flex-shrink:0}
#app{display:flex;flex-direction:column;height:calc(100vh - 22px)}
#canvas-wrap{flex:1;position:relative;min-height:0;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#controls{flex-shrink:0;background:#161b22;border-top:1px solid #30363d;padding:6px 8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;font-size:11px}
#controls label{color:#8b949e;display:flex;align-items:center;gap:3px;white-space:nowrap}
#controls select,#controls button,#controls input{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:3px 6px;font-family:inherit;font-size:10px;cursor:pointer}
#controls button:hover{background:#21262d}
#controls button.on{background:#238636;border-color:#238636;color:#fff}
#controls input[type=range]{width:50px;padding:0}
#flowVal{color:#58a6ff;min-width:24px;text-align:right;font-size:10px}
@media(max-width:500px){
  #controls{font-size:9px;padding:4px}
  #controls select{max-width:110px}
}
</style>
</head>
<body>
<div id="warn">⚠️ Experimental AI mini-app — not professionally validated</div>
<div id="app">
<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="controls">
  <label>Source<select id="scen"></select></label>
  <label>Flow <input id="flow" type="range" min="5" max="60" value="25" step="1"><span id="flowVal">25</span></label>
  <button id="btnRun">▶ Start</button>
  <button id="btnReset">↺ Reset</button>
  <button id="togPlume" class="on">Gas</button>
</div>
</div>
<script>
(function(){
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;

// ── CO₂ Thermodynamics (NIST) ──
const SCENARIOS=[
  {name:'Vacuum-Insulated Bulk',T:-20,P:2.0,h:120},
  {name:'High-Pressure Cylinder',T:20,P:6.0,h:240},
  {name:'Low-Pressure Cylinder',T:20,P:3.5,h:255},
  {name:'Refrigerated Tank',T:-30,P:1.5,h:95},
  {name:'Ambient Bulk Tank',T:15,P:2.3,h:230}
];

function calc(s){
  const H_VAP=571, H_SOL=0;
  const T_SUB=-78.5, CP_P=7.38;
  const sf=Math.max(0,Math.min(1,(H_VAP-s.h)/(H_VAP-H_SOL)));
  const mech=Math.min(0.90,Math.max(0.65,0.75+(T_SUB-s.T)/100*0.15));
  const eff=sf*mech;
  const wr=eff>0.001?(1-eff)/eff:999;
  const ps=Math.max(10,Math.min(100,30+(s.T-T_SUB)*0.4+(s.P/CP_P)*(-10)));
  return {...s, sf, mech, eff, wr, ps};
}

let si=0, sc=calc(SCENARIOS[0]);
let flow=25, running=false;
let buckKg=0, wasteKg=0, t=0;
let showGas=true;
let snowP=[], gasP=[];

function resize(){
  const r=canvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  W=canvas.width=r.width*dpr;
  H=canvas.height=r.height*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function spawnSnow(){
  const cx=W/2, hb=H*.38;
  const nb=W*.13;
  const spawnX=cx+(Math.random()-.5)*nb*2;
  const spawnY=hb;
  const a=Math.PI/2+(Math.random()-.5)*0.6;
  const sp=8+Math.random()*30;
  snowP.push({
    x:spawnX, y:spawnY,
    vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
    r:2+Math.random()*3,
    life:1, inB:false, settled:false
  });
}

function spawnGas(){
  if(!showGas) return;
  const cx=W/2, hb=H*.38;
  const gapTop=hb;
  const gapBot=H*.55;
  const gapH=gapBot-gapTop;
  const bw=W*.44;
  for(let k=0;k<4;k++){
    gasP.push({
      x:cx+(Math.random()-.5)*bw,
      y:gapTop+Math.random()*gapH,
      vx:(Math.random()-.5)*25,
      vy:-(40+Math.random()*80),
      r:12+Math.random()*20,
      life:1, ph:Math.random()*Math.PI*2
    });
  }
}

function update(dt){
  if(!running) return;
  const f=flow/3600;
  buckKg+=f*sc.eff*dt;
  wasteKg+=f*(1-sc.eff)*dt;
  t+=dt;

  const snowRate=flow*2.5;
  for(let i=0;i<3;i++){
    if(Math.random()<snowRate*dt) spawnSnow();
  }
  if(Math.random()<snowRate*0.8*dt) spawnGas();

  const cx=W/2;
  const bw=W*.44;
  const bx=cx-bw/2;
  const by=H*.55;
  const bh=H*.25;
  const bB=by+bh;
  const wallSlope=(bw*.075)/bh;

  for(let p of snowP){
    if(p.settled) continue;

    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.vy+=40*dt;

    const dy=Math.max(0,p.y-by);
    const innerL=bx+dy*wallSlope;
    const innerR=bx+bw-dy*wallSlope;

    if(p.y>=by && p.x>innerL && p.x<innerR){
      if(!p.inB){
        p.inB=true;
        p.vx*=0.05;
        p.vy*=0.02;
      }
      if(p.y>=bB-3){
        p.y=bB-2;
        p.vy=0; p.vx=0;
        p.settled=true;
      }
    } else if(p.y>bB+5){
      p.life=0;
    }

    if(!p.inB && !p.settled) p.life-=dt*.02;
  }

  snowP=snowP.filter(p=>p.life>0||p.settled);
  const settled=snowP.filter(p=>p.settled);
  if(settled.length>300){
    snowP=snowP.filter(p=>!p.settled).concat(settled.slice(-300));
  }

  for(let p of gasP){
    p.y+=p.vy*dt;
    p.x+=p.vx*dt+Math.sin(p.ph+t*3)*10*dt;
    p.r+=dt*1.5;
    p.life-=dt*.06;
  }
  gasP=gasP.filter(p=>p.life>0);
}

function draw(){
  const cssW=canvas.width/(window.devicePixelRatio||1);
  const cssH=canvas.height/(window.devicePixelRatio||1);

  ctx.fillStyle='#0d1117';
  ctx.fillRect(0,0,cssW,cssH);

  const cx=cssW/2;

  // ── HORN ──
  const nt=cssW*.04;
  const nb=cssW*.13;
  const hy=cssH*.08;
  const hb=cssH*.38;

  const hGrad=ctx.createLinearGradient(cx,hy,cx,hb);
  hGrad.addColorStop(0,'#4a5568');
  hGrad.addColorStop(.5,'#2d3748');
  hGrad.addColorStop(1,'#1a202c');
  ctx.beginPath();
  ctx.moveTo(cx-nt,hy); ctx.lineTo(cx-nb,hb);
  ctx.lineTo(cx+nb,hb); ctx.lineTo(cx+nt,hy);
  ctx.closePath();
  ctx.fillStyle=hGrad; ctx.fill();
  ctx.strokeStyle='#5a6a7e'; ctx.lineWidth=1.5; ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(cx,hy,nt,3,0,0,Math.PI*2);
  ctx.fillStyle='#3d4a5c'; ctx.fill();
  ctx.strokeStyle='#6a7a8e'; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx-nt*.5,hy+3); ctx.lineTo(cx-nb*.6,hb-3);
  ctx.lineTo(cx+nb*.6,hb-3); ctx.lineTo(cx+nt*.5,hy+3);
  ctx.closePath();
  ctx.fillStyle='rgba(20,30,40,0.3)'; ctx.fill();

  // Horn labels - smooth text
  ctx.fillStyle='#8b949e'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('NOZZLE',cx,hy-10);
  ctx.fillStyle='#6a7a8e'; ctx.font='9px sans-serif';
  ctx.fillText(sc.P.toFixed(1)+' MPa',cx,hy+12);
  ctx.fillStyle='#8b949e'; ctx.font='10px sans-serif';
  ctx.fillText('EXPANSION HORN',cx,(hy+hb)*.5+10);
  ctx.fillStyle='#6a7a8e'; ctx.font='9px sans-serif';
  ctx.fillText('1 atm',cx,hb-8);

  // ── BUCKET ──
  const bw=cssW*.44;
  const bx=cx-bw/2;
  const by=cssH*.55;
  const bh=cssH*.25;
  const bB=by+bh;
  const bBottomW=bw*.85;

  ctx.beginPath();
  ctx.moveTo(bx,by);
  ctx.lineTo(cx-bBottomW/2,bB);
  ctx.lineTo(cx+bBottomW/2,bB);
  ctx.lineTo(bx+bw,by);
  ctx.closePath();
  const bGrad=ctx.createLinearGradient(bx,by,bx,bB);
  bGrad.addColorStop(0,'#374151');
  bGrad.addColorStop(1,'#1f2937');
  ctx.fillStyle=bGrad; ctx.fill();
  ctx.strokeStyle='#6b7280'; ctx.lineWidth=1.5; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(bx-2,by); ctx.lineTo(bx+bw+2,by);
  ctx.strokeStyle='#9ca3af'; ctx.lineWidth=2.5; ctx.stroke();

  ctx.fillStyle='#8b949e'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('COLLECTION BUCKET',cx,by-10);

  // ── FALLING SNOW ──
  for(let p of snowP){
    if(!p.inB && !p.settled){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(230,242,255,${p.life*.9})`; ctx.fill();
      if(p.r>1.5){
        ctx.beginPath(); ctx.arc(p.x-p.r*.15,p.y-p.r*.15,p.r*.2,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${p.life*.5})`; ctx.fill();
      }
    }
  }

  // ── GAS ──
  for(let p of gasP){
    const a=p.life;
    const gg=ctx.createRadialGradient(p.x,p.y,p.r*.15,p.x,p.y,p.r);
    gg.addColorStop(0,`rgba(200,215,230,${a*.1})`);
    gg.addColorStop(.6,`rgba(160,180,200,${a*.05})`);
    gg.addColorStop(1,'rgba(120,140,160,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill();
  }

  // ── SNOW PILE ──
  const maxFill=2;
  const frac=Math.min(buckKg/maxFill,0.95);
  if(frac>0.01){
    const snowH=bh*.9*frac;
    const snowY=bB-snowH;
    const taperRatio=snowH/bh;
    const pileTopW=bBottomW+(bw-bBottomW)*taperRatio;

    ctx.beginPath();
    ctx.moveTo(cx-bBottomW/2,bB);
    for(let i=0;i<=20;i++){
      const tt=i/20;
      const sx=cx-bBottomW/2+tt*pileTopW;
      const sy=snowY-Math.sin(tt*Math.PI)*4*frac;
      ctx.lineTo(sx,sy);
    }
    ctx.lineTo(cx+bBottomW/2,bB);
    ctx.closePath();
    ctx.fillStyle='#b8d4e8'; ctx.fill();
    ctx.strokeStyle='#7aa4b8'; ctx.lineWidth=1; ctx.stroke();

    ctx.beginPath();
    for(let i=0;i<=20;i++){
      const tt=i/20;
      const sx=cx-bBottomW/2+tt*pileTopW;
      const sy=snowY-Math.sin(tt*Math.PI)*4*frac;
      if(i===0)ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
    }
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();

    for(let i=0;i<200*frac;i++){
      const tx=cx-bBottomW/2+Math.random()*bBottomW;
      const ty=snowY+Math.random()*snowH*.9;
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.arc(tx,ty,1+Math.random()*1.5,0,Math.PI*2); ctx.fill();
    }
  }

  // ── SETTLED SNOW ──
  for(let p of snowP){
    if(p.settled){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*.5,0,Math.PI*2);
      ctx.fillStyle='rgba(235,245,255,0.6)'; ctx.fill();
    }
  }

  // Nozzle flash
  if(running){
    const fg=ctx.createRadialGradient(cx,hy+2,1,cx,hy+2,16);
    fg.addColorStop(0,'rgba(200,230,255,0.25)');
    fg.addColorStop(1,'rgba(200,230,255,0)');
    ctx.beginPath(); ctx.arc(cx,hy+2,16,0,Math.PI*2); ctx.fillStyle=fg; ctx.fill();
  }

  // ── TOP STATS BAR ──
  const barH=38;
  ctx.fillStyle='rgba(13,17,23,0.95)';
  ctx.fillRect(0,0,cssW,barH);
  ctx.strokeStyle='#30363d';
  ctx.beginPath(); ctx.moveTo(0,barH); ctx.lineTo(cssW,barH); ctx.stroke();

  ctx.fillStyle='#c9d1d9'; ctx.font='bold 11px sans-serif'; ctx.textAlign='left';
  ctx.fillText('CO₂ Snow Maker',10,16);
  ctx.fillStyle='#8b949e'; ctx.font='9px sans-serif';
  ctx.fillText(sc.name,10,30);

  const stats=[
    ['FILL', buckKg.toFixed(2)+' kg', '#39d2c0'],
    ['EFF', (sc.eff*100).toFixed(1)+'%', '#3fb950'],
    ['WASTE', wasteKg.toFixed(2)+' kg', '#f0883e'],
    ['FLOW', flow+' kg/h', '#a371f7']
  ];

  let statX=cssW-10;
  ctx.font='9px sans-serif';
  for(let i=stats.length-1;i>=0;i--){
    const [l,v,c]=stats[i];
    ctx.fillStyle=c; ctx.textAlign='right';
    ctx.fillText(v,statX,28);
    ctx.fillStyle='#6b7280'; ctx.textAlign='right';
    ctx.fillText(l,statX,16);
    statX-=Math.max(55, ctx.measureText(v).width+12);
  }
}

let lastT=0;
function loop(time){
  if(!lastT) lastT=time;
  const dt=Math.min((time-lastT)/1000, .05);
  lastT=time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// UI
const sel=document.getElementById('scen');
SCENARIOS.forEach((s,i)=>{
  const o=document.createElement('option');
  o.value=i; o.textContent=s.name;
  sel.appendChild(o);
});
sel.addEventListener('change',()=>{si=+sel.value;sc=calc(SCENARIOS[si]);});

const fInp=document.getElementById('flow'), fVal=document.getElementById('flowVal');
fInp.addEventListener('input',()=>{flow=+fInp.value;fVal.textContent=flow;});

document.getElementById('btnRun').addEventListener('click',function(){
  running=!running;
  this.textContent=running?'⏸ Stop':'▶ Start';
  this.classList.toggle('on',running);
});

document.getElementById('btnReset').addEventListener('click',()=>{
  buckKg=0; wasteKg=0; t=0;
  snowP=[]; gasP=[];
  running=false;
  document.getElementById('btnRun').textContent='▶ Start';
  document.getElementById('btnRun').classList.remove('on');
});

document.getElementById('togPlume').addEventListener('click',function(){
  showGas=!showGas; this.classList.toggle('on',showGas);
});

window.addEventListener('resize',resize);
resize();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
