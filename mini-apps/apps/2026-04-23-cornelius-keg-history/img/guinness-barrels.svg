<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#1A0F08"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#A0822A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <rect width="400" height="480" fill="url(#bg)"/>
  <!-- Stack of barrels -->
  <g transform="translate(80,80)">
    <path d="M20,20 Q0,80 20,160 L180,160 Q200,80 180,20 Z" fill="url(#barrel)" stroke="#6B4F10" stroke-width="1.5"/>
    <rect x="-5" y="45" width="210" height="8" rx="4" fill="#555"/>
    <rect x="-5" y="120" width="210" height="8" rx="4" fill="#555"/>
  </g>
  <g transform="translate(160,80)">
    <path d="M20,20 Q0,80 20,160 L180,160 Q200,80 180,20 Z" fill="url(#barrel)" stroke="#6B4F10" stroke-width="1.5"/>
    <rect x="-5" y="45" width="210" height="8" rx="4" fill="#555"/>
    <rect x="-5" y="120" width="210" height="8" rx="4" fill="#555"/>
  </g>
  <!-- Top barrel -->
  <g transform="translate(120,0)">
    <path d="M20,20 Q0,60 20,110 L160,110 Q180,60 160,20 Z" fill="url(#barrel)" stroke="#6B4F10" stroke-width="1.5"/>
    <rect x="-5" y="35" width="190" height="7" rx="3.5" fill="#555"/>
    <rect x="-5" y="85" width="190" height="7" rx="3.5" fill="#555"/>
  </g>
  <!-- Guinness text -->
  <text x="200" y="320" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#D4A04D" font-weight="bold">GUINNESS</text>
  <text x="200" y="350" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#B89A6A">St. James's Gate Brewery</text>
  <!-- Floor -->
  <rect y="400" width="400" height="80" fill="#3A2515" opacity="0.5"/>
  <text x="200" y="460" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#D4A04D" font-style="italic">Wooden Beer Barrels</text>
</svg>