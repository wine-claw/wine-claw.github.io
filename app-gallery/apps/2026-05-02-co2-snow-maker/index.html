<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CO₂ Snow Maker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;color:#c9d1d9;font-family:'SF Mono',monospace;font-size:13px}
#warn{background:#2d1f1f;border-bottom:1px solid #5a3a3a;padding:3px 10px;font-size:10px;color:#f0883e;text-align:center}
#app{display:flex;flex-direction:column;height:calc(100% - 22px)}
#canvas-wrap{flex:1;position:relative;min-height:0}
canvas{display:block;width:100%;height:100%}
#controls{flex-shrink:0;background:#161b22;border-top:1px solid #30363d;padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px}
#controls label{color:#8b949e;display:flex;align-items:center;gap:4px}
#controls select,#controls button,#controls input{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-family:inherit;font-size:11px;cursor:pointer}
#controls button:hover{background:#21262d}
#controls button.on{background:#238636;border-color:#238636;color:#fff}
#controls input[type=range]{width:60px;padding:0}
#flowVal{color:#58a6ff;min-width:32px;text-align:right}
@media(max-width:500px){#controls{font-size:10px;padding:5px}#controls select{max-width:130px}}
</style>
</head>
<body>
<div id="warn">⚠️ Experimental AI mini-app — not professionally validated</div>
<div id="app">
<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="controls">
  <label>Source<select id="scen"></select></label>
  <label>Flow <input id="flow" type="range" min="5" max="60" value="25" step="1"><span id="flowVal">25</span> kg/h</label>
  <button id="btnRun">▶ Start</button>
  <button id="btnReset">↺ Reset</button>
  <button id="togPlume" class="on">Gas</button>
  <button id="togPhase" class="on">Phase</button>
</div>
</div>
<script>
(function(){
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,DPR=1;

//  Physics
const TP_T=-56.6, TP_PMPa=0.518;
const CP_T=31.04, CP_PMPa=7.38;
const TATM=-78.5;
const H_VAP=571, H_SOL=0;

const SCENARIOS=[
  {name:'Vacuum-Insulated Bulk',TC:-20,PMPa:2.0,h:120},
  {name:'High-Pressure Cylinder',TC:20,PMPa:6.0,h:240},
  {name:'Low-Pressure Cylinder',TC:20,PMPa:3.5,h:255},
  {name:'Refrigerated Tank',TC:-30,PMPa:1.5,h:95},
  {name:'Ambient Bulk Tank',TC:15,PMPa:2.3,h:230}
];

function calc(s){
  const sf=Math.max(0,Math.min(1,(H_VAP-s.h)/(H_VAP-H_SOL)));
  const mech=Math.min(0.88,Math.max(0.72,0.80-(s.TC+30)/200*0.08));
  const eff=sf*mech;
  const wr=eff>0.001?(1-eff)/eff:999;
  const ps=Math.max(15,Math.min(120,30+(20-s.TC)*1.5+(s.PMPa/6)*(-15)));
  return {...s, sf, mech, eff, wr, ps};
}

let si=0, sc=calc(SCENARIOS[0]);
let flow=25, running=false;
let buckKg=0, wasteKg=0, t=0;
let showGas=true, showPhase=true;
let snowP=[], gasP=[], liqP=[];

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const r=canvas.getBoundingClientRect();
  W=canvas.width=Math.floor(r.width*DPR);
  H=canvas.height=Math.floor(r.height*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W=r.width; H=r.height;
}

// Spawn helpers
function spawnLiq(){
  liqP.push({x:W*.30+(Math.random()-.5)*8, y:H*.08, r:1+Math.random()*2, vy:35+Math.random()*25, life:1});
}
function spawnSnow(){
  const cx=W*.30, hb=H*.42;
  const a=(Math.random()-.5)*.6+Math.PI/2;
  const sp=20+Math.random()*80;
  snowP.push({x:cx+(Math.random()-.5)*8, y:hb, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, r:1+Math.random()*3, life:1, inB:false});
}
function spawnGas(){
  if(!showGas)return;
  const cx=W*.30, hb=H*.42, gy=hb+H*.05;
  for(let k=0;k<4;k++){
    gasP.push({x:cx+(Math.random()-.5)*140, y:gy+Math.random()*20, vx:(Math.random()-.5)*50, vy:-(80+Math.random()*160), r:20+Math.random()*40, life:1, ph:Math.random()*Math.PI*2});
  }
}

function update(dt){
  if(!running)return;
  const f=flow/3600;
  buckKg+=f*sc.eff*dt;
  wasteKg+=f*(1-sc.eff)*dt;
  t+=dt;

  if(liqP.length<30) spawnLiq();
  
  // Continuous snow spawn based on flow rate
  const snowPerSec = flow * 0.5;
  const toSpawn = Math.floor(snowPerSec * dt);
  for(let i=0;i<toSpawn;i++) spawnSnow();
  
  // Always spawn at least some
  if(Math.random()<snowPerSec*dt-toSpawn) spawnSnow();
  
  // Continuous gas spawn
  const gasPerSec = flow * 0.4;
  const gasToSpawn = Math.floor(gasPerSec * dt);
  for(let i=0;i<gasToSpawn;i++) spawnGas();
  if(Math.random()<gasPerSec*dt-gasToSpawn) spawnGas();

  // Liquid - fall through horn
  for(let p of liqP){
    p.y+=p.vy*dt;
    p.life-=dt*1.8;
  }
  liqP=liqP.filter(p=>p.life>0&&p.y<H*.35);

  // Bucket params matching draw
  const bx=W*.08, bw=W*.30, by=H*.55, bh=H*.22;
  const bB=by+bh;

  // Snow - gravity + bucket capture
  for(let p of snowP){
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.vy+=45*dt;
    // Tapered walls
    const fy=p.y-by;
    const lx=bx+fy*.04;
    const rx=bx+bw-fy*.04;
    if(p.y>by&&p.x>lx&&p.x<rx&&p.y<bB){
      if(!p.inB){p.inB=true;p.vx*=0.15;p.vy*=0.05;}
      if(p.y>bB-6){p.y=bB-6;p.vy=0;p.vx*=0.3;}
    } else if(p.y>bB){p.life=0;}
    // Don't decay life for settled particles
    if(!p.inB) p.life-=dt*.05;
  }
  snowP=snowP.filter(p=>p.life>0);

  // Gas - rise + waft
  for(let p of gasP){
    p.y+=p.vy*dt;
    p.x+=p.vx*dt+Math.sin(p.ph+t*4)*20*dt;
    p.r+=dt*3;
    p.life-=dt*.12;
  }
  gasP=gasP.filter(p=>p.life>0);
}

function draw(){
  ctx.fillStyle='#0d1117';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(48,54,61,0.12)';
  ctx.lineWidth=.5;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Divider
  const leftW=W*.58;
  ctx.strokeStyle='rgba(48,54,61,0.3)';
  ctx.beginPath();ctx.moveTo(leftW,0);ctx.lineTo(leftW,H);ctx.stroke();

  // ── Layout coordinates ──
  const cx=W*.30;
  const nt=W*.04;      // horn top radius
  const nb=W*.13;      // horn bottom radius (narrower than bucket)
  const hy=H*.08;      // horn top Y
  const hb=H*.42;      // horn bottom Y
  const gap=H*.05;     // gap between horn and bucket
  // Bucket
  const bx=W*.08, bw=W*.30;
  const by=hb+gap;
  const bh=H*.22;
  const bB=by+bh;

  // ── EXPANSION HORN ──
  // Body (trapezoid)
  const hGrad=ctx.createLinearGradient(cx,hy,cx,hb);
  hGrad.addColorStop(0,'#4a5568');
  hGrad.addColorStop(.5,'#2d3748');
  hGrad.addColorStop(1,'#1a202c');
  ctx.beginPath();
  ctx.moveTo(cx-nt,hy); ctx.lineTo(cx-nb,hb);
  ctx.lineTo(cx+nb,hb); ctx.lineTo(cx+nt,hy);
  ctx.closePath();
  ctx.fillStyle=hGrad; ctx.fill();
  ctx.strokeStyle='#5a6a7e'; ctx.lineWidth=1.5; ctx.stroke();

  // Top ellipse
  ctx.beginPath();
  ctx.ellipse(cx,hy,nt,3,0,0,Math.PI*2);
  ctx.fillStyle='#3d4a5c'; ctx.fill();
  ctx.strokeStyle='#6a7a8e'; ctx.stroke();

  // Inner shadow
  ctx.beginPath();
  ctx.moveTo(cx-nt*.6,hy+3); ctx.lineTo(cx-nb*.7,hb-3);
  ctx.lineTo(cx+nb*.7,hb-3); ctx.lineTo(cx+nt*.6,hy+3);
  ctx.closePath();
  ctx.fillStyle='rgba(20,30,40,0.35)'; ctx.fill();

  // Labels inside horn
  ctx.fillStyle='#8b949e'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('1 atm',cx,(hy+hb)*.5);
  ctx.fillStyle='#6a7a8e'; ctx.font='8px monospace';
  ctx.fillText(sc.PMPa.toFixed(1)+' MPa',cx,hy+12);

  // External labels
  ctx.fillStyle='#8b949e'; ctx.font='9px monospace';
  ctx.fillText('NOZZLE',cx,hy-8);
  ctx.fillText('EXPANSION HORN',cx,(hy+hb)*.55+8);

  // ── BUCKET ──
  ctx.beginPath();
  ctx.moveTo(bx,by);
  ctx.lineTo(bx+bw*.08,bB);
  ctx.lineTo(bx+bw*.92,bB);
  ctx.lineTo(bx+bw,by);
  ctx.closePath();
  const bGrad=ctx.createLinearGradient(bx,by,bx,bB);
  bGrad.addColorStop(0,'#374151');
  bGrad.addColorStop(1,'#1f2937');
  ctx.fillStyle=bGrad; ctx.fill();
  ctx.strokeStyle='#6b7280'; ctx.lineWidth=1.5; ctx.stroke();

  // Bucket rim
  ctx.beginPath();
  ctx.moveTo(bx-2,by); ctx.lineTo(bx+bw+2,by);
  ctx.strokeStyle='#9ca3af'; ctx.lineWidth=2.5; ctx.stroke();

  // Bucket label
  ctx.fillStyle='#8b949e'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('COLLECTION BUCKET',bx+bw/2,by-10);

  // ── SNOW PILE (solid fill from bottom up) ──
  const maxFill=8;
  const frac=Math.min(buckKg/maxFill,0.92);
  if(frac>0.001){
    const snowH=bh*.95*frac;
    const snowY=bB-snowH;

    ctx.beginPath();
    ctx.moveTo(bx+bw*.08,bB);
    for(let i=0;i<=20;i++){
      const tt=i/20;
      const sx=bx+bw*.08+tt*bw*.84;
      const sy=snowY-Math.sin(tt*Math.PI)*10*frac;
      ctx.lineTo(sx,sy);
    }
    ctx.lineTo(bx+bw*.92,bB);
    ctx.closePath();
    ctx.fillStyle='#d4e8f7'; ctx.fill();
    ctx.strokeStyle='#8ab4c8'; ctx.lineWidth=1; ctx.stroke();

    // Highlight curve
    ctx.beginPath();
    for(let i=0;i<=20;i++){
      const tt=i/20;
      const sx=bx+bw*.08+tt*bw*.84;
      const sy=snowY-Math.sin(tt*Math.PI)*10*frac;
      if(i===0)ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
    }
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2; ctx.stroke();

    // Snow speckles
    for(let i=0;i<80*frac;i++){
      const sx=bx+bw*.1+Math.random()*bw*.78;
      const sy=snowY+Math.random()*snowH*.92;
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(sx,sy,1+Math.random()*2,0,Math.PI*2); ctx.fill();
    }
  }

  // ── LIQUID PARTICLES ──
  for(let p of liqP){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(77,166,255,${p.life*.6})`; ctx.fill();
  }

  // ── SNOW PARTICLES (falling) ──
  for(let p of snowP){
    if(!p.inB){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(230,242,255,${p.life*.85})`; ctx.fill();
      if(p.r>2){
        ctx.beginPath(); ctx.arc(p.x-p.r*.3,p.y-p.r*.3,p.r*.35,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${p.life*.5})`; ctx.fill();
      }
    }
  }

  // ── GAS PLUMES (more transparent, continuous) ──
  for(let p of gasP){
    const a=p.life;
    // Large grey cloud - more transparent
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,190,205,${a*.25})`; ctx.fill();
    // Lighter core
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*.35,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,230,240,${a*.35})`; ctx.fill();
  }

  // Nozzle flash
  if(running){
    const fg=ctx.createRadialGradient(cx,hy+3,1,cx,hy+3,22);
    fg.addColorStop(0,'rgba(200,230,255,0.4)');
    fg.addColorStop(1,'rgba(200,230,255,0)');
    ctx.beginPath(); ctx.arc(cx,hy+3,22,0,Math.PI*2); ctx.fillStyle=fg; ctx.fill();
  }

  // Scenario label
  ctx.fillStyle='#c9d1d9'; ctx.font='11px monospace'; ctx.textAlign='left';
  ctx.fillText(sc.name,12,20);
  ctx.fillStyle='#8b949e'; ctx.font='9px monospace';
  ctx.fillText(`${sc.TC}°C  ${sc.PMPa} MPa  |  h=${sc.h} kJ/kg`,12,34);

  // ── PHASE DIAGRAM (bottom right) ──
  if(showPhase){
    const pdW=170, pdH=170, pdX=W-pdW-12, pdY=H-pdH-12;
    ctx.fillStyle='rgba(13,17,23,0.95)'; ctx.strokeStyle='#30363d';
    ctx.beginPath(); ctx.rect(pdX,pdY,pdW,pdH); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#8b949e'; ctx.font='9px monospace'; ctx.textAlign='center';
    ctx.fillText('CO₂ Phase Diagram',pdX+pdW/2,pdY+12);

    const pad=24, ax=pdX+pad, ay=pdY+pdH-pad+2, aw=pdW-pad*2, ah=pdH-pad*2-10;
    ctx.strokeStyle='#484f58'; ctx.lineWidth=.7;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax,ay-ah); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax+aw,ay); ctx.stroke();

    const tX=v=>ax+((v+80)/110)*aw;
    const pY=v=>ay-(Math.log10(v/.05)/Math.log10(10/.05))*ah;

    // Sublimation line
    ctx.strokeStyle='#58a6ff'; ctx.lineWidth=1.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(tX(TATM),pY(.1013)); ctx.lineTo(tX(TP_T),pY(TP_PMPa)); ctx.stroke();
    // Melting
    ctx.strokeStyle='#39d2c0';
    ctx.beginPath(); ctx.moveTo(tX(TP_T),pY(TP_PMPa)); ctx.lineTo(tX(-10),pY(8)); ctx.stroke();
    // Vaporisation
    ctx.strokeStyle='#f0883e';
    ctx.beginPath(); ctx.moveTo(tX(TP_T),pY(TP_PMPa)); ctx.lineTo(tX(CP_T),pY(CP_PMPa)); ctx.stroke();

    ctx.fillStyle='#8b949e'; ctx.font='7px monospace'; ctx.textAlign='center';
    ctx.fillText('SOLID',tX(-65),pY(.08));
    ctx.fillText('LIQUID',tX(0),pY(4));
    ctx.fillText('GAS',tX(15),pY(.25));

    // TP marker
    ctx.fillStyle='#d29922'; ctx.beginPath(); ctx.arc(tX(TP_T),pY(TP_PMPa),3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8b949e'; ctx.font='6px monospace'; ctx.fillText('TP',tX(TP_T)+5,pY(TP_PMPa)-5);
    // CP marker
    ctx.fillStyle='#f85149'; ctx.beginPath(); ctx.arc(tX(CP_T),pY(CP_PMPa),3,0,Math.PI*2); ctx.fill();
    ctx.fillText('CP',tX(CP_T)+5,pY(CP_PMPa)-5);

    // Source state
    const sx=tX(sc.TC), sy=pY(sc.PMPa);
    ctx.fillStyle='#3fb950'; ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3fb950'; ctx.stroke();

    // Expansion path (dashed)
    ctx.setLineDash([3,3]); ctx.strokeStyle='#3fb950'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx,pY(.1013)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(sx,pY(.1013)); ctx.lineTo(tX(TATM),pY(.1013)); ctx.stroke();

    // Animated expansion dot
    const expT=t*2; // cycle time
    const expPhase=(expT%1);
    const ex=sx+(tX(TATM)-sx)*expPhase;
    const ey=sy+(pY(.1013)-sy)*expPhase;
    ctx.fillStyle='#3fb950';
    ctx.beginPath(); ctx.arc(ex,ey,3+Math.sin(expT*Math.PI)*1.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(63,185,80,0.5)';
    ctx.beginPath(); ctx.arc(ex,ey,6,0,Math.PI*2); ctx.stroke();

    // Arrow
    ctx.beginPath(); ctx.moveTo(tX(TATM),pY(.1013));
    ctx.lineTo(tX(TATM)+5,pY(.1013)-3); ctx.lineTo(tX(TATM)+5,pY(.1013)+3);
    ctx.closePath(); ctx.fillStyle='#3fb950'; ctx.fill();

    // Axis labels
    ctx.fillStyle='#6b7280'; ctx.font='8px monospace'; ctx.textAlign='center';
    ctx.fillText('T °C',ax+aw/2,ay+11);
    ctx.save(); ctx.translate(ax-8,ay-ah/2); ctx.rotate(-Math.PI/2); ctx.fillText('P (MPa)',0,0); ctx.restore();

    // Tick marks
    ctx.fillStyle='#484f58'; ctx.font='6px monospace';
    for(let v=-60;v<=20;v+=20){ctx.fillText(v,tX(v),ay+4);}
    ctx.textAlign='right';
    for(let v=.1;v<=5;v*=2){ctx.fillText(v,ax-3,pY(v)+3);}
  }

  // ── METRICS (top right) ──
  const mx=W-205, my=10, mw=195;
  ctx.fillStyle='rgba(13,17,23,0.92)'; ctx.strokeStyle='#30363d';
  ctx.beginPath(); ctx.rect(mx,my,mw,230); ctx.fill(); ctx.stroke();

  ctx.fillStyle='#8b949e'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText('📊 METRICS',mx+10,my+16);

  const rows=[
    ['BUCKET FILL', buckKg.toFixed(2), 'kg', '#39d2c0'],
    ['GAS WASTED', wasteKg.toFixed(2), 'kg', '#f0883e'],
    ['EFFICIENCY', (sc.eff*100).toFixed(1), '%', '#3fb950'],
    ['SOLID FRAC.', (sc.sf*100).toFixed(1), '%', '#58a6ff'],
    ['WASTE RATIO', sc.wr.toFixed(2), 'kg/kg', '#f85149'],
    ['FLOW RATE', flow.toFixed(0), 'kg/h', '#a371f7'],
    ['PARTICLE Ø', sc.ps.toFixed(0), 'μm', '#d29922'],
    ['MECH CAPTURE', (sc.mech*100).toFixed(1), '%', '#8b949e']
  ];
  ctx.font='11px monospace';
  for(let r=0;r<rows.length;r++){
    const [l,v,u,c]=rows[r];
    const y=my+32+r*25;
    ctx.fillStyle='#8b949e'; ctx.textAlign='left'; ctx.fillText(l,mx+10,y);
    ctx.fillStyle=c; ctx.textAlign='right'; ctx.fillText(v+' '+u,mx+mw-10,y);
  }
}

let lastT=0;
function loop(time){
  if(!lastT)lastT=time;
  const dt=Math.min((time-lastT)/1000, .05);
  lastT=time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// UI binding
const sel=document.getElementById('scen');
SCENARIOS.forEach((s,i)=>{
  const o=document.createElement('option');
  o.value=i; o.textContent=s.name;
  sel.appendChild(o);
});
sel.addEventListener('change',()=>{si=+sel.value;sc=calc(SCENARIOS[si]);});

const fInp=document.getElementById('flow'), fVal=document.getElementById('flowVal');
fInp.addEventListener('input',()=>{flow=+fInp.value;fVal.textContent=flow;});

document.getElementById('btnRun').addEventListener('click',function(){
  running=!running;
  this.textContent=running?'⏸ Stop':'▶ Start';
  this.classList.toggle('on',running);
});

document.getElementById('btnReset').addEventListener('click',()=>{
  buckKg=0; wasteKg=0; t=0;
  snowP=[]; gasP=[]; liqP=[];
});

document.getElementById('togPlume').addEventListener('click',function(){
  showGas=!showGas; this.classList.toggle('on',showGas);
});
document.getElementById('togPhase').addEventListener('click',function(){
  showPhase=!showPhase; this.classList.toggle('on',showPhase);
});

window.addEventListener('resize',resize);

// Start
resize();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
