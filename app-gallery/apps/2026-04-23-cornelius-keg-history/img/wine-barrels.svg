<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0822A"/>
      <stop offset="50%" stop-color="#C4A035"/>
      <stop offset="100%" stop-color="#A0822A"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="480" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="380" width="400" height="100" fill="#5A7A3A"/>
  <rect y="370" width="400" height="20" fill="#6B8A42" rx="5"/>
  <!-- Row of barrels -->
  <g transform="translate(30,200)">
    <path d="M20,20 Q0,80 20,170 L100,170 Q120,80 100,20 Z" fill="url(#barrel)" stroke="#8B6914" stroke-width="1.5"/>
    <rect x="-2" y="40" width="124" height="8" rx="4" fill="#555"/>
    <rect x="-2" y="130" width="124" height="8" rx="4" fill="#555"/>
  </g>
  <g transform="translate(140,200)">
    <path d="M20,20 Q0,80 20,170 L100,170 Q120,80 100,20 Z" fill="url(#barrel)" stroke="#8B6914" stroke-width="1.5"/>
    <rect x="-2" y="40" width="124" height="8" rx="4" fill="#555"/>
    <rect x="-2" y="130" width="124" height="8" rx="4" fill="#555"/>
  </g>
  <g transform="translate(250,200)">
    <path d="M20,20 Q0,80 20,170 L100,170 Q120,80 100,20 Z" fill="url(#barrel)" stroke="#8B6914" stroke-width="1.5"/>
    <rect x="-2" y="40" width="124" height="8" rx="4" fill="#555"/>
    <rect x="-2" y="130" width="124" height="8" rx="4" fill="#555"/>
  </g>
  <!-- Vineyard building -->
  <rect x="280" y="140" width="80" height="60" fill="#D4B896" stroke="#8B6914" stroke-width="1"/>
  <polygon points="280,140 320,110 360,140" fill="#8B4513"/>
  <rect x="300" y="155" width="20" height="25" fill="#654321"/>
  <!-- Sun -->
  <circle cx="60" cy="60" r="25" fill="#FFD700" opacity="0.8"/>
  <text x="200" y="460" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#5A3E0A" font-style="italic">Winery Barrel Storage</text>
</svg>