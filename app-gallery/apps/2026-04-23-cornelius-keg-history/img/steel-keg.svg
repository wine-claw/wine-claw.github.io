<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D0D0D0"/>
      <stop offset="30%" stop-color="#E8E8E8"/>
      <stop offset="70%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <radialGradient id="top" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#B0B0B0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="480" fill="#1A1A1A"/>
  <!-- Keg body -->
  <path d="M120,60 Q100,240 120,420 L280,420 Q300,240 280,60 Z" fill="url(#steel)" stroke="#888" stroke-width="2"/>
  <!-- Top ellipse -->
  <ellipse cx="200" cy="60" rx="80" ry="25" fill="url(#top)" stroke="#999" stroke-width="1.5"/>
  <!-- Handle/chimney -->
  <rect x="185" y="30" width="30" height="35" rx="4" fill="#AAA" stroke="#888" stroke-width="1"/>
  <ellipse cx="200" cy="30" rx="15" ry="5" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
  <!-- Bottom rim -->
  <ellipse cx="200" cy="420" rx="80" ry="20" fill="#A0A0A0" stroke="#888" stroke-width="1.5"/>
  <!-- Bands -->
  <path d="M105,120 Q200,140 295,120" stroke="#888" stroke-width="4" fill="none"/>
  <path d="M102,250 Q200,270 298,250" stroke="#888" stroke-width="4" fill="none"/>
  <path d="M105,370 Q200,390 295,370" stroke="#888" stroke-width="4" fill="none"/>
  <!-- Label -->
  <rect x="140" y="160" width="120" height="70" rx="5" fill="#8B0000"/>
  <text x="200" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#FFD700" font-weight="bold">EKU</text>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FFD700">BIER</text>
  <!-- Reflection -->
  <path d="M160,70 Q155,240 160,400" stroke="rgba(255,255,255,0.2)" stroke-width="15" fill="none"/>
  <text x="200" y="460" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#CCC" font-style="italic">Stainless Steel Beer Keg</text>
</svg>