<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#A89878"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#B89A3A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <rect width="400" height="480" fill="url(#sky)"/>
  <!-- Dock/ground -->
  <rect y="350" width="400" height="130" fill="#8B7355"/>
  <rect y="340" width="400" height="20" fill="#A08A64"/>
  <!-- Mass of barrels - row 1 -->
  <g transform="translate(10,180)">
