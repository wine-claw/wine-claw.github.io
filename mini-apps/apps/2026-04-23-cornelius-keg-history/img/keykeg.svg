<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#D4E8F7"/>
      <stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="480" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="350" width="400" height="130" fill="#8B7855"/>
  <!-- KeyKeg - cylindrical plastic/pET keg -->
  <g transform="translate(140,80)">
    <!-- Body -->
    <rect x="20" y="0" width="80" height="270" rx="40" fill="#F5F0E8" stroke="#C0B8A0" stroke-width="2"/>
    <!-- Top cap -->
    <ellipse cx="60" cy="10" rx="40" ry="10" fill="#E8E0D0" stroke="#C0B8A0" stroke-width="1.5"/>
    <!-- Bottom -->
    <ellipse cx="60" cy="270" rx="40" ry="10" fill="#DDD5C5" stroke="#C0B8A0" stroke-width="1.5"/>
    <!-- Fitting on top -->
    <rect x="50" y="-20" width="20" height="25" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
    <circle cx="60" cy="-20" r="8" fill="#AAA" stroke="#888" stroke-width="1.5"/>
    <!-- Key fitting circle -->
    <circle cx="60" cy="-20" r="4" fill="#666"/>
    <!-- Label area -->
    <rect x="30" y="80" width="60" height="100" rx="3" fill="#2E8B57"/>
    <text x="60" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">Key</text>
    <text x="60" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">Keg</text>
    <text x="60" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B0D8B0">20L</text>
    <!-- Seam line -->
    <line x1="60" y1="10" x2="60" y2="270" stroke="#C0B8A0" stroke-width="0.5" stroke-dasharray="4,4"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="200" cy="365" rx="50" ry="8" fill="rgba(0,0,0,0.1)"/>
  <text x="200" y="460" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#5A3E0A" font-style="italic">Modern KeyKeg System</text>
</svg>