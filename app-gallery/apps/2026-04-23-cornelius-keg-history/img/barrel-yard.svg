    <rect x="-5" y="30" width="110" height="7" rx="3.5" fill="#555"/>
    <rect x="-5" y="110" width="110" height="7" rx="3.5" fill="#555"/>
  </g>
  <g transform="translate(170,180)">
    <ellipse cx="50" cy="0" rx="45" ry="20" fill="#A08A2A"/>
    <path d="M5,0 Q-10,80 5,160 L95,160 Q110,80 95,0 Z" fill="url(#barrel)"/>
    <rect x="-5" y="30" width="110" height="7" rx="3.5" fill="#555"/>
    <rect x="-5" y="110" width="110" height="7" rx="3.5" fill="#555"/>
  </g>
  <g transform="translate(250,180)">
    <ellipse cx="50" cy="0" rx="45" ry="20" fill="#A08A2A"/>
    <path d="M5,0 Q-10,80 5,160 L95,160 Q110,80 95,0 Z" fill="url(#barrel)"/>
    <rect x="-5" y="30" width="110" height="7" rx="3.5" fill="#555"/>
    <rect x="-5" y="110" width="110" height="7" rx="3.5" fill="#555"/>
  </g>
  <g transform="translate(330,180)">
    <ellipse cx="50" cy="0" rx="45" ry="20" fill="#A08A2A"/>
    <path d="M5,0 Q-10,80 5,160 L95,160 Q110,80 95,0 Z" fill="url(#barrel)"/>
    <rect x="-5" y="30" width="110" height="7" rx="3.5" fill="#555"/>
    <rect x="-5" y="110" width="110" height="7" rx="3.5" fill="#555"/>
  </g>
  <!-- Seagulls -->
  <path d="M30,60 Q35,55 40,60 Q45,55 50,60" stroke="#555" stroke-width="1.5" fill="none"/>
  <path d="M320,40 Q325,35 330,40 Q335,35 340,40" stroke="#555" stroke-width="1.5" fill="none"/>
  <text x="200" y="460" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#5A3E0A" font-style="italic">Industrial Barrel Yard — Savannah</text>
