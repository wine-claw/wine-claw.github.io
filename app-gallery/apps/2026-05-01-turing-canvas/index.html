<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turing's Canvas — Gray-Scott Reaction-Diffusion</title>
<style>
  :root { color-scheme: dark; --bg:#0a0a0a; --panel:#141414; --text:#e8e8e8; --muted:#888; --accent:#4ade80; }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
  h1 { font-size: 1.6rem; margin-bottom: 8px; }
  p { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; text-align: center; max-width: 600px; }
  #canvas-wrapper { border-radius: 12px; overflow: hidden; border: 1px solid #222; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  canvas { display: block; image-rendering: pixelated; }
  .controls { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  button { padding: 10px 18px; border-radius: 10px; border: 1px solid #333; background: var(--panel); color: var(--text); cursor: pointer; font-size: 0.9rem; }
  button:hover { border-color: var(--accent); }
  .param-row { margin-top: 14px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  label { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  input[type="range"] { accent-color: var(--accent); }
  .footer { margin-top: 24px; font-size: 0.75rem; color: #555; }
</style>
</head>
<body>
<h1>Turing's Canvas</h1>
<p>Gray-Scott reaction-diffusion simulation. Click or drag on the canvas to add activator. Different starting patterns and parameters create spots, stripes, coral, or chaotic waves.</p>

<div id="canvas-wrapper">
  <canvas id="sim" width="512" height="512"></canvas>
</div>

<div class="controls">
  <button id="btn-reset-coral">Coral</button>
  <button id="btn-reset-spots">Spots</button>
  <button id="btn-reset-stripes">Stripes</button>
  <button id="btn-reset-chaos">Chaos</button>
  <button id="btn-pause">Pause</button>
  <button id="btn-clear">Clear</button>
</div>

<div class="param-row">
  <label>F: <input type="range" id="feed" min="0" max="0.1" step="0.001" value="0.0545"></label>
  <label>k: <input type="range" id="kill" min="0" max="0.08" step="0.001" value="0.062"></label>
  <label>Diffusion A: <input type="range" id="diffA" min="0" max="1" step="0.01" value="0.2"></label>
  <label>Diffusion B: <input type="range" id="diffB" min="0" max="1" step="0.01" value="0.1"></label>
  <label>Speed: <input type="range" id="speed" min="1" max="20" step="1" value="1"></label>
</div>

<div class="footer">Gray-Scott model · pixel-doubled for visibility</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const w = canvas.width, h = canvas.height;
const size = w * h;

let a = new Float32Array(size), b = new Float32Array(size);
let nextA = new Float32Array(size), nextB = new Float32Array(size);

let feed = 0.0545, kill = 0.062, diffA = 0.2, diffB = 0.1, speed = 1, running = true;

function idx(x, y) {
  x = (x + w) % w; y = (y + h) % h;
  return y * w + x;
}

function reset(mode) {
  for (let i = 0; i < size; i++) { a[i] = 1; b[i] = 0; }
  if (mode === 'coral') {
    for (let y = h/2 - 10; y < h/2 + 10; y++)
      for (let x = w/2 - 10; x < w/2 + 10; x++)
        b[idx(x, y)] = 1;
    feed = 0.0545; kill = 0.062; diffA = 0.2; diffB = 0.1;
  } else if (mode === 'spots') {
    for (let i = 0; i < 30; i++) {
      const cx = Math.random()*w|0, cy = Math.random()*h|0, r = 3 + Math.random()*6;
      for (let y = cy - r; y <= cy + r; y++)
        for (let x = cx - r; x <= cx + r; x++)
          if ((x-cx)**2 + (y-cy)**2 <= r**2) b[idx(x, y)] = 1;
    }
    feed = 0.03; kill = 0.062; diffA = 0.2; diffB = 0.1;
  } else if (mode === 'stripes') {
    for (let y = 0; y < h; y++)
      for (let x = w/2 - 2; x <= w/2 + 2; x++)
        b[idx(x, y)] = 1;
    feed = 0.03; kill = 0.054; diffA = 0.2; diffB = 0.1;
  } else if (mode === 'chaos') {
    for (let i = 0; i < 100; i++) {
      const cx = Math.random()*w|0, cy = Math.random()*h|0;
      for (let dy = -3; dy <= 3; dy++)
        for (let dx = -3; dx <= 3; dx++)
          b[idx(cx+dx, cy+dy)] = Math.random();
    }
    feed = 0.026; kill = 0.051; diffA = 0.2; diffB = 0.1;
  }
  updateSliders();
}

function updateSliders() {
  document.getElementById('feed').value = feed;
  document.getElementById('kill').value = kill;
  document.getElementById('diffA').value = diffA;
  document.getElementById('diffB').value = diffB;
}

const img = ctx.createImageData(w, h);

function step() {
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = idx(x, y);
      const A = a[i], B = b[i];
      const lapA = (a[idx(x-1,y)] + a[idx(x+1,y)] + a[idx(x,y-1)] + a[idx(x,y+1)] - 4*A);
      const lapB = (b[idx(x-1,y)] + b[idx(x+1,y)] + b[idx(x,y-1)] + b[idx(x,y+1)] - 4*B);
      const reaction = A * B * B;
      nextA[i] = A + (diffA * lapA - reaction + feed * (1 - A)) * speed;
      nextB[i] = B + (diffB * lapB + reaction - (kill + feed) * B) * speed;
      if (nextA[i] < 0) nextA[i] = 0; if (nextA[i] > 1) nextA[i] = 1;
      if (nextB[i] < 0) nextB[i] = 0; if (nextB[i] > 1) nextB[i] = 1;
    }
  }
  [a, nextA] = [nextA, a];
  [b, nextB] = [nextB, b];
}

function draw() {
  for (let i = 0; i < size; i++) {
    const val = Math.floor(b[i] * 255);
    img.data[i*4] = val; img.data[i*4+1] = val * 0.6 | 0; img.data[i*4+2] = val * 0.3 | 0;
    img.data[i*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

let mouseDown = false;
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (w / rect.width) | 0;
  const y = (e.clientY - rect.top) * (h / rect.height) | 0;
  for (let dy = -4; dy <= 4; dy++)
    for (let dx = -4; dx <= 4; dx++)
      b[idx(x+dx, y+dy)] = 1;
});

document.getElementById('btn-reset-coral').onclick = () => reset('coral');
document.getElementById('btn-reset-spots').onclick = () => reset('spots');
document.getElementById('btn-reset-stripes').onclick = () => reset('stripes');
document.getElementById('btn-reset-chaos').onclick = () => reset('chaos');
document.getElementById('btn-pause').onclick = () => { running = !running; document.getElementById('btn-pause').textContent = running ? 'Pause' : 'Resume'; };
document.getElementById('btn-clear').onclick = () => { for (let i = 0; i < size; i++) { a[i] = 1; b[i] = 0; } };

document.getElementById('feed').oninput = e => feed = +e.target.value;
document.getElementById('kill').oninput = e => kill = +e.target.value;
document.getElementById('diffA').oninput = e => diffA = +e.target.value;
document.getElementById('diffB').oninput = e => diffB = +e.target.value;
document.getElementById('speed').oninput = e => speed = +e.target.value;

reset('coral');

function loop() {
  if (running) step();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
