<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CO₂ Snow Maker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;color:#c9d1d9;font-family:'SF Mono',monospace;font-size:13px}
#warn{background:#2d1f1f;border-bottom:1px solid #5a3a3a;padding:3px 10px;font-size:10px;color:#f0883e;text-align:center}
#app{display:flex;flex-direction:column;height:calc(100% - 22px)}
#canvas-wrap{flex:1;position:relative;min-height:0}
canvas{display:block;width:100%;height:100%}
#controls{flex-shrink:0;background:#161b22;border-top:1px solid #30363d;padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px}
#controls label{color:#8b949e;display:flex;align-items:center;gap:4px}
#controls select,#controls button,#controls input{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-family:inherit;font-size:11px;cursor:pointer}
#controls button:hover{background:#21262d}
#controls button.on{background:#238636;border-color:#238636;color:#fff}
#controls input[type=range]{width:60px;padding:0}
#flowVal{color:#58a6ff;min-width:32px;text-align:right}
@media(max-width:500px){#controls{font-size:10px;padding:5px}#controls select{max-width:130px}}
</style>
</head>
<body>
<div id="warn">⚠️ Experimental AI mini-app — not professionally validated</div>
<div id="app">
<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="controls">
  <label>Source<select id="scen"></select></label>
  <label>Flow <input id="flow" type="range" min="5" max="60" value="25" step="1"><span id="flowVal">25</span> kg/h</label>
  <button id="btnRun">▶ Start</button>
  <button id="btnReset">↺ Reset</button>
  <button id="togPlume" class="on">Gas</button>
</div>
</div>
<script>
(function(){
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,DPR=1;

// ── NIST CO₂ Thermodynamics ──
// Triple point: -56.6°C, 0.518 MPa
// Critical point: 31.04°C, 7.38 MPa
// Sublimation at 1 atm: -78.5°C
// Reference enthalpies (kJ/kg) at triple point:
//   Solid: 0 (reference), Liquid: ~137, Vapor: 571
// For Joule-Thomson expansion: h_in = h_out = h_solid*(1-x) + h_vapor*x at 1 atm
// Solid fraction = (h_vapor - h_source)/(h_vapor - h_solid)

const TP_T=-56.6, TP_P=0.518;
const CP_T=31.04, CP_P=7.38;
const T_SUB=-78.5; // sublimation at 1 atm
const H_SOL=0, H_LIQ=137, H_VAP=571;

// Source scenarios (T in °C, P in MPa, h in kJ/kg from NIST tables)
const SCENARIOS=[
  {name:'Vacuum-Insulated Bulk',T:-20,P:2.0,h:120,desc:'Liquid at -20°C, 2 MPa'},
  {name:'High-Pressure Cylinder',T:20,P:6.0,h:240,desc:'Supercritical at 20°C, 6 MPa'},
  {name:'Low-Pressure Cylinder',T:20,P:3.5,h:255,desc:'Liquid at 20°C, 3.5 MPa'},
  {name:'Refrigerated Tank',T:-30,P:1.5,h:95,desc:'Liquid at -30°C, 1.5 MPa'},
  {name:'Ambient Bulk Tank',T:15,P:2.3,h:230,desc:'Liquid at 15°C, 2.3 MPa'}
];

function calc(s){
  // Solid fraction from energy balance:
  // h_source = h_solid*(1-x) + h_vapor*x
  // x = (h_source - h_solid)/(h_vapor - h_solid) = vapor fraction
  // sf = 1 - x = (h_vapor - h_source)/(h_vapor - h_solid)
  const sf=Math.max(0,Math.min(1,(H_VAP-s.h)/(H_VAP-H_SOL)));
  
  // Mechanical capture efficiency:
  // Colder source = denser solid, easier to capture
  // Warmer source = more vapor, harder to capture
  // Base 75%, +10% for very cold, -10% for warm
  const mech=Math.min(0.90,Math.max(0.65,0.75+(T_SUB-s.T)/100*0.15));
  
  // Total efficiency
  const eff=sf*mech;
  
  // Waste ratio = (1-eff)/eff
  const wr=eff>0.001?(1-eff)/eff:999;
  
  // Particle size (μm):
  // Colder = faster nucleation = smaller particles
  // Warmer = slower nucleation = larger particles
  // Base 30μm, range 10-100μm
  const ps=Math.max(10,Math.min(100,30+(s.T-T_SUB)*0.4+(s.P/CP_P)*(-10)));
  
  // Isenthalpic temperature after expansion to 1 atm
  // Mixture at 1 atm: T_final = T_sub*(sf) + T_ambient*(1-sf) for vapor
  // Actually just use sublimation temp for solid, and source temp for vapor portion
  const tFinal=T_SUB*sf+s.T*(1-sf);
  
  return {...s, sf, mech, eff, wr, ps, tFinal};
}

let si=0, sc=calc(SCENARIOS[0]);
let flow=25, running=false;
let buckKg=0, wasteKg=0, t=0;
let showGas=true;
let snowP=[], gasP=[], liqP=[];

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const r=canvas.getBoundingClientRect();
  W=canvas.width=Math.floor(r.width*DPR);
  H=canvas.height=Math.floor(r.height*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W=r.width; H=r.height;
}

function spawnLiq(){
  liqP.push({x:W*.30+(Math.random()-.5)*6, y:H*.08, r:1+Math.random()*2, vy:30+Math.random()*20, life:1});
}
function spawnSnow(){
  const cx=W*.30, hb=H*.42;
  const a=(Math.random()-.5)*.5+Math.PI/2;
  const sp=25+Math.random()*70;
  snowP.push({x:cx+(Math.random()-.5)*6, y:hb, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, r:1+Math.random()*2.5, life:1, inB:false, settled:false});
}
function spawnGas(){
  if(!showGas)return;
  const cx=W*.30, hb=H*.42, gy=hb+H*.06;
  for(let k=0;k<5;k++){
    gasP.push({x:cx+(Math.random()-.5)*120, y:gy+Math.random()*15, vx:(Math.random()-.5)*40, vy:-(60+Math.random()*140), r:18+Math.random()*35, life:1, ph:Math.random()*Math.PI*2});
  }
}

function update(dt){
  if(!running)return;
  const f=flow/3600;
  buckKg+=f*sc.eff*dt;
  wasteKg+=f*(1-sc.eff)*dt;
  t+=dt;

  if(liqP.length<25) spawnLiq();
  
  // Continuous snow spawn
  const snowPerSec=flow*0.6;
  const toSpawn=Math.floor(snowPerSec*dt);
  for(let i=0;i<toSpawn;i++) spawnSnow();
  if(Math.random()<snowPerSec*dt-toSpawn) spawnSnow();
  
  // Continuous gas spawn
  const gasPerSec=flow*0.5;
  const gasToSpawn=Math.floor(gasPerSec*dt);
  for(let i=0;i<gasToSpawn;i++) spawnGas();
  if(Math.random()<gasPerSec*dt-gasToSpawn) spawnGas();

  // Liquid falls through horn
  for(let p of liqP){
    p.y+=p.vy*dt;
    p.life-=dt*2;
  }
  liqP=liqP.filter(p=>p.life>0&&p.y<H*.35);

  // Bucket — centered under horn
  const cx=W*.30;
  const bw=W*.32;
  const bx=cx-bw/2;  // CENTERED under horn
  const by=H*.55;
  const bh=H*.20;
  const bB=by+bh;

  // Snow physics
  for(let p of snowP){
    if(p.settled) continue; // Skip settled particles
    
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.vy+=50*dt;
    
    // Bucket walls (tapered)
    const fy=p.y-by;
    const lx=bx+fy*.035;
    const rx=bx+bw-fy*.035;
    
    if(p.y>by&&p.x>lx&&p.x<rx){
      // Inside bucket
      if(!p.inB){
        p.inB=true;
        p.vx*=0.1;
        p.vy*=0.02;
      }
      if(p.y>=bB-4){
        // Hit bottom — settle
        p.y=bB-4;
        p.vy=0;
        p.vx=0;
        p.settled=true;
      }
    } else if(p.y>bB){
      // Missed bucket, fell past
      p.life=0;
    }
    
    if(!p.inB&&!p.settled) p.life-=dt*.04;
  }
  
  // Remove dead particles but KEEP settled ones
  snowP=snowP.filter(p=>p.life>0||p.settled);
  
  // Limit settled particles for performance
  const settled=snowP.filter(p=>p.settled);
  if(settled.length>500){
    // Remove oldest settled particles
    snowP=snowP.filter(p=>!p.settled).concat(settled.slice(-500));
  }

  // Gas physics
  for(let p of gasP){
    p.y+=p.vy*dt;
    p.x+=p.vx*dt+Math.sin(p.ph+t*3)*15*dt;
    p.r+=dt*2.5;
    p.life-=dt*.1;
  }
  gasP=gasP.filter(p=>p.life>0);
}

function draw(){
  ctx.fillStyle='#0d1117';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='rgba(48,54,61,0.08)';
  ctx.lineWidth=.5;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Layout
  const leftW=W*.58;
  ctx.strokeStyle='rgba(48,54,61,0.25)';
  ctx.beginPath();ctx.moveTo(leftW,0);ctx.lineTo(leftW,H);ctx.stroke();

  // ── HORN ──
  const cx=W*.30;
  const nt=W*.04;      // top radius
  const nb=W*.12;      // bottom radius (narrower than bucket)
  const hy=H*.08;
  const hb=H*.42;
  
  const hGrad=ctx.createLinearGradient(cx,hy,cx,hb);
  hGrad.addColorStop(0,'#4a5568');
  hGrad.addColorStop(.5,'#2d3748');
  hGrad.addColorStop(1,'#1a202c');
  ctx.beginPath();
  ctx.moveTo(cx-nt,hy); ctx.lineTo(cx-nb,hb);
  ctx.lineTo(cx+nb,hb); ctx.lineTo(cx+nt,hy);
  ctx.closePath();
  ctx.fillStyle=hGrad; ctx.fill();
  ctx.strokeStyle='#5a6a7e'; ctx.lineWidth=1.5; ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(cx,hy,nt,3,0,0,Math.PI*2);
  ctx.fillStyle='#3d4a5c'; ctx.fill();
  ctx.strokeStyle='#6a7a8e'; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx-nt*.6,hy+3); ctx.lineTo(cx-nb*.7,hb-3);
  ctx.lineTo(cx+nb*.7,hb-3); ctx.lineTo(cx+nt*.6,hy+3);
  ctx.closePath();
  ctx.fillStyle='rgba(20,30,40,0.35)'; ctx.fill();

  ctx.fillStyle='#8b949e'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('1 atm',cx,(hy+hb)*.5);
  ctx.fillStyle='#6a7a8e'; ctx.font='8px monospace';
  ctx.fillText(sc.P.toFixed(1)+' MPa',cx,hy+12);
  ctx.fillStyle='#8b949e'; ctx.font='9px monospace';
  ctx.fillText('NOZZLE',cx,hy-8);
  ctx.fillText('EXPANSION HORN',cx,(hy+hb)*.55+8);

  // ── BUCKET (centered under horn) ──
  const bw=W*.32;
  const bx=cx-bw/2;  // CENTERED
  const by=H*.55;
  const bh=H*.20;
  const bB=by+bh;
  
  ctx.beginPath();
  ctx.moveTo(bx,by);
  ctx.lineTo(bx+bw*.06,bB);
  ctx.lineTo(bx+bw*.94,bB);
  ctx.lineTo(bx+bw,by);
  ctx.closePath();
  const bGrad=ctx.createLinearGradient(bx,by,bx,bB);
  bGrad.addColorStop(0,'#374151');
  bGrad.addColorStop(1,'#1f2937');
  ctx.fillStyle=bGrad; ctx.fill();
  ctx.strokeStyle='#6b7280'; ctx.lineWidth=1.5; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(bx-2,by); ctx.lineTo(bx+bw+2,by);
  ctx.strokeStyle='#9ca3af'; ctx.lineWidth=2.5; ctx.stroke();

  ctx.fillStyle='#8b949e'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('COLLECTION BUCKET',cx,by-10);

  // ── SNOW PILE ──
  const maxFill=5;
  const frac=Math.min(buckKg/maxFill,0.88);
  if(frac>0.005){
    const snowH=bh*.9*frac;
    const snowY=bB-snowH;

    ctx.beginPath();
    ctx.moveTo(bx+bw*.06,bB);
    for(let i=0;i<=20;i++){
      const tt=i/20;
      const sx=bx+bw*.06+tt*bw*.88;
      const sy=snowY-Math.sin(tt*Math.PI)*8*frac;
      ctx.lineTo(sx,sy);
    }
    ctx.lineTo(bx+bw*.94,bB);
    ctx.closePath();
    ctx.fillStyle='#c8dff2'; ctx.fill();
    ctx.strokeStyle='#8ab4c8'; ctx.lineWidth=1; ctx.stroke();

    // Highlight
    ctx.beginPath();
    for(let i=0;i<=20;i++){
      const tt=i/20;
      const sx=bx+bw*.06+tt*bw*.88;
      const sy=snowY-Math.sin(tt*Math.PI)*8*frac;
      if(i===0)ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
    }
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2; ctx.stroke();

    // Texture
    for(let i=0;i<60*frac;i++){
      const sx=bx+bw*.1+Math.random()*bw*.8;
      const sy=snowY+Math.random()*snowH*.9;
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.arc(sx,sy,1+Math.random()*1.5,0,Math.PI*2); ctx.fill();
    }
  }

  // ── LIQUID PARTICLES ──
  for(let p of liqP){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(77,166,255,${p.life*.5})`; ctx.fill();
  }

  // ── FALLING SNOW ──
  for(let p of snowP){
    if(!p.inB&&!p.settled){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(230,242,255,${p.life*.8})`; ctx.fill();
      if(p.r>1.5){
        ctx.beginPath(); ctx.arc(p.x-p.r*.25,p.y-p.r*.25,p.r*.3,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${p.life*.4})`; ctx.fill();
      }
    }
  }

  // ── SETTLED SNOW (drawn on pile) ──
  const settled=snowP.filter(p=>p.settled);
  for(let p of settled){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*.6,0,Math.PI*2);
    ctx.fillStyle='rgba(220,235,255,0.6)'; ctx.fill();
  }

  // ── GAS PLUMES ──
  for(let p of gasP){
    const a=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(170,185,200,${a*.2})`; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*.3,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,220,235,${a*.3})`; ctx.fill();
  }

  // Nozzle flash
  if(running){
    const fg=ctx.createRadialGradient(cx,hy+3,1,cx,hy+3,20);
    fg.addColorStop(0,'rgba(200,230,255,0.35)');
    fg.addColorStop(1,'rgba(200,230,255,0)');
    ctx.beginPath(); ctx.arc(cx,hy+3,20,0,Math.PI*2); ctx.fillStyle=fg; ctx.fill();
  }

  // Scenario label
  ctx.fillStyle='#c9d1d9'; ctx.font='11px monospace'; ctx.textAlign='left';
  ctx.fillText(sc.name,12,20);
  ctx.fillStyle='#8b949e'; ctx.font='9px monospace';
  ctx.fillText(`${sc.T}°C  ${sc.P} MPa  |  h=${sc.h} kJ/kg`,12,34);

  // ── METRICS (top right, taller) ──
  const mx=W-205, my=10, mw=195;
  ctx.fillStyle='rgba(13,17,23,0.92)'; ctx.strokeStyle='#30363d';
  ctx.beginPath(); ctx.rect(mx,my,mw,280); ctx.fill(); ctx.stroke();

  ctx.fillStyle='#8b949e'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText('📊 METRICS',mx+10,my+16);

  const rows=[
    ['BUCKET FILL', buckKg.toFixed(3), 'kg', '#39d2c0'],
    ['GAS WASTED', wasteKg.toFixed(3), 'kg', '#f0883e'],
    ['EFFICIENCY', (sc.eff*100).toFixed(1), '%', '#3fb950'],
    ['SOLID FRAC.', (sc.sf*100).toFixed(1), '%', '#58a6ff'],
    ['WASTE RATIO', sc.wr.toFixed(2), 'kg/kg', '#f85149'],
    ['FLOW RATE', flow.toFixed(0), 'kg/h', '#a371f7'],
    ['PARTICLE Ø', sc.ps.toFixed(1), 'μm', '#d29922'],
    ['MECH CAPTURE', (sc.mech*100).toFixed(1), '%', '#8b949e'],
    ['FINAL TEMP', sc.tFinal.toFixed(1), '°C', '#f0883e']
  ];
  ctx.font='11px monospace';
  for(let r=0;r<rows.length;r++){
    const [l,v,u,c]=rows[r];
    const y=my+32+r*28;
    ctx.fillStyle='#8b949e'; ctx.textAlign='left'; ctx.fillText(l,mx+10,y);
    ctx.fillStyle=c; ctx.textAlign='right'; ctx.fillText(v+' '+u,mx+mw-10,y);
  }
}

let lastT=0;
function loop(time){
  if(!lastT)lastT=time;
  const dt=Math.min((time-lastT)/1000, .05);
  lastT=time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// UI
const sel=document.getElementById('scen');
SCENARIOS.forEach((s,i)=>{
  const o=document.createElement('option');
  o.value=i; o.textContent=s.name;
  sel.appendChild(o);
});
sel.addEventListener('change',()=>{si=+sel.value;sc=calc(SCENARIOS[si]);});

const fInp=document.getElementById('flow'), fVal=document.getElementById('flowVal');
fInp.addEventListener('input',()=>{flow=+fInp.value;fVal.textContent=flow;});

document.getElementById('btnRun').addEventListener('click',function(){
  running=!running;
  this.textContent=running?'⏸ Stop':'▶ Start';
  this.classList.toggle('on',running);
});

document.getElementById('btnReset').addEventListener('click',()=>{
  buckKg=0; wasteKg=0; t=0;
  snowP=[]; gasP=[]; liqP=[];
});

document.getElementById('togPlume').addEventListener('click',function(){
  showGas=!showGas; this.classList.toggle('on',showGas);
});

window.addEventListener('resize',resize);
resize();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
