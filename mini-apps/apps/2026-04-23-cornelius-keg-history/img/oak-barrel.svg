<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#A0822A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="hoop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>
  <!-- Barrel body -->
  <path d="M100,80 Q60,240 100,400 L300,400 Q340,240 300,80 Z" fill="url(#wood)" stroke="#6B4F10" stroke-width="2"/>
  <!-- Stave lines -->
  <line x1="140" y1="82" x2="140" y2="398" stroke="#7A5A12" stroke-width="0.5" opacity="0.4"/>
  <line x1="180" y1="80" x2="180" y2="400" stroke="#7A5A12" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="80" x2="220" y2="400" stroke="#7A5A12" stroke-width="0.5" opacity="0.4"/>
  <line x1="260" y1="82" x2="260" y2="398" stroke="#7A5A12" stroke-width="0.5" opacity="0.4"/>
  <!-- Metal hoops -->
  <rect x="55" y="120" width="290" height="12" rx="6" fill="url(#hoop)"/>
  <rect x="55" y="230" width="290" height="12" rx="6" fill="url(#hoop)"/>
  <rect x="55" y="340" width="290" height="12" rx="6" fill="url(#hoop)"/>
  <!-- Bung hole -->
  <circle cx="200" cy="290" r="14" fill="#5A3E0A" stroke="#444" stroke-width="2"/>
  <circle cx="200" cy="290" r="8" fill="#333"/>
  <!-- Highlight -->
  <path d="M150,90 Q130,240 150,390" stroke="rgba(255,255,255,0.15)" stroke-width="20" fill="none"/>
  <!-- Shadow -->
  <path d="M260,90 Q280,240 260,390" stroke="rgba(0,0,0,0.15)" stroke-width="20" fill="none"/>
  <!-- Label -->
  <text x="200" y="460" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#8B6914" font-style="italic">Traditional Oak Barrel</text>
</svg>